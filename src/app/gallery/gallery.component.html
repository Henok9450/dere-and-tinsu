<section id="gallery" class="py-20 px-4 bg-transparent">
  <div class="container mx-auto">
    <h2 class="text-3xl font-script text-center text-gold-accent mb-2">Memories</h2>
    <h3 class="text-4xl font-ubuntu font-bold text-center text-white mb-16">
      Our Gallery
    </h3>

    <!-- Masonry Grid -->
    <div class="columns-1 sm:columns-2 md:columns-3 lg:columns-4 gap-6 space-y-6 max-w-7xl mx-auto">
      @for (img of images; track img; let idx = $index) {
        <div 
          (click)="openLightbox(img, idx)"
          class="break-inside-avoid overflow-hidden rounded-2xl shadow-sm border border-gray-700 hover:shadow-xl hover:border-gold-accent/40 transition-all duration-300 hover:scale-[1.02] cursor-pointer group relative"
        >
          <img 
            [src]="img" 
            alt="Gallery photo" 
            loading="lazy" 
            class="w-full h-auto object-cover rounded-2xl"
          >
          <!-- Hover heart overlay -->
          <div class="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300 rounded-2xl">
            <span class="text-white text-3xl transform scale-75 group-hover:scale-100 transition-transform duration-300">❤️</span>
          </div>
        </div>
      }
    </div>
  </div>

  <!-- Interactive Lightbox Modal -->
  @if (activeImage) {
    <div 
      (click)="closeLightbox()"
      class="fixed inset-0 bg-black/95 backdrop-blur-sm z-[1000] flex items-center justify-center p-4 transition-all duration-300 animate-fade-in"
    >
      <!-- Close Button -->
      <button 
        (click)="closeLightbox()" 
        class="absolute top-6 right-6 text-white/70 hover:text-white text-4xl font-light hover:scale-110 transition-transform outline-none"
      >
        &times;
      </button>

      <!-- Prev Button -->
      <button 
        (click)="prevImage($event)" 
        class="absolute left-4 top-1/2 -translate-y-1/2 text-white/70 bg-white/10 hover:bg-white/20 w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center text-2xl md:text-3xl font-light hover:scale-110 transition-transform outline-none z-50"
      >
        &#8249;
      </button>

      <!-- Fullscreen Image -->
      <div class="max-w-4xl max-h-[85vh] flex items-center justify-center p-2 relative" (click)="$event.stopPropagation()">
        <img 
          [src]="activeImage" 
          alt="Enlarged photo" 
          class="max-w-full max-h-[85vh] rounded-lg shadow-2xl object-contain animate-scale-up"
        >
      </div>

      <!-- Next Button -->
      <button 
        (click)="nextImage($event)" 
        class="absolute right-4 top-1/2 -translate-y-1/2 text-white/70 bg-white/10 hover:bg-white/20 w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center text-2xl md:text-3xl font-light hover:scale-110 transition-transform outline-none z-50"
      >
        &#8250;
      </button>
    </div>
  }
</section>
